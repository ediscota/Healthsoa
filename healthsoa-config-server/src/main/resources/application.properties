spring.application.name=healthsoa-config-server
server.port=8888

spring.cloud.config.server.git.uri=file:${PROPERTIES_REPO_PATH:${user.dir}/../healthsoa-properties-repository}
spring.cloud.config.server.git.default-label=main
spring.cloud.config.server.git.clone-on-start=true

management.endpoints.web.exposure.include=health,info,refresh
